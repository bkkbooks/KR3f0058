body:
  text: 玉符瑞圖龍出虞舜時黃龍從洛水出詣舜鱗甲成字舜即位與三公臨觀黃龍五采負圖出舜前白泉泉色白自出山澤得禮制則澤谷之白泉出飲之使人長壽蒼烏見文王時見蒼烏王者孝悌則至火為朱烏赤烏武王時銜穀至屋上兵不血創而殷服鳳凰之佐鸞鳥者赤神之精鳳凰之佐雞身赤色色亦被五彩鳴中五音肅肅雍雍喜則鳴舞人君進退有慶親踈有序則至一本曰心識鍾律律調則至鳴舞以和之銜珠而舞晉平公鼓琴有玄鶴二八而下銜明珠舞于庭一鶴失珠覔得而走師曠掩口而笑白鵠翔師曠鼓琴通于神明而白鵠翔
